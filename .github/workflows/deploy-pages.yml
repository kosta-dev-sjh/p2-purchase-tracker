# GitHub Pages 배포 워크플로
# main 브랜치에 푸시가 발생하면 자동으로 Vite 빌드를 만들고
# GitHub Pages로 배포합니다. Settings → Pages 에서 Source를 "GitHub Actions"로 지정해야 동작합니다.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# GITHUB_TOKEN이 Pages 배포에 필요한 권한을 갖도록 설정합니다.
permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 여러 배포가 돌지 않도록 concurrency group을 pages로 묶어 둡니다.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
