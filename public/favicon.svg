<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- 배경: 브랜드 인디고 (tokens.color.accent) -->
  <rect width="64" height="64" rx="14" fill="#4F46E5"/>

  <!-- 막대 차트: 작은→중간→큰 순. 흰색에 알파만 다르게 줘서 깊이감을 줌 -->
  <rect x="13" y="36" width="9" height="15" rx="2" fill="#FFFFFF" fill-opacity="0.55"/>
  <rect x="27.5" y="28" width="9" height="23" rx="2" fill="#FFFFFF" fill-opacity="0.78"/>
  <rect x="42" y="20" width="9" height="31" rx="2" fill="#FFFFFF"/>

  <!-- 트렌드 라인: 막대 위를 가로지르며 "추적"을 표현 -->
  <path d="M14 33 L30.5 24 L47 15"
        stroke="#FFFFFF" stroke-width="3"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 라인 끝점: 도트로 마무리 -->
  <circle cx="47" cy="15" r="3.5" fill="#4F46E5" stroke="#FFFFFF" stroke-width="2.2"/>
</svg>
